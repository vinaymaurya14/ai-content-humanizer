version: "3.8"

services:
  humanizer:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./nltk_data:/usr/local/nltk_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
